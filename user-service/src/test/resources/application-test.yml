spring:
  config:
    import: ""
  cloud:
    config:
      enabled: false
  datasource:
    url: jdbc:h2:mem:user;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: test-group

jwt:
  access-token-expire-seconds: 900
  refresh-token-expire-seconds: 604800

eureka:
  client:
    enabled: false

user:
  kafka:
    consumer:
      settlement:
        topic: settlement-events
    listener:
      settlement:
        enabled: false