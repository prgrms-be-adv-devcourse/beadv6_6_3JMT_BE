spring:
  config:
    import: ""
  cloud:
    config:
      enabled: false
  datasource:
    url: jdbc:h2:mem:user;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

jwt:
  access-token-expire-seconds: 3600
  refresh-token-expire-seconds: 2592000

eureka:
  client:
    enabled: false