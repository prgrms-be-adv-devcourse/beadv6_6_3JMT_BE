server:
  port: 8081

spring:
  cloud:
    config:
      enabled: false
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:prompthub}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  private-key: ${JWT_PRIVATE_KEY}
  public-key: ${JWT_PUBLIC_KEY}
  access-token-expire-seconds: 3600
  refresh-token-expire-seconds: 2592000

grpc:
  server:
    port: 9081
  client:
    product-service:
      address: 'static://localhost:9082'
      negotiation-type: plaintext

eureka:
  client:
    enabled: false

cors:
  allowed-origins: "http://localhost:3000"
