server:
  port: 8081

spring:
  cloud:
    config:
      enabled: false
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:prompthub}?currentSchema=user_service
    username: ${DB_USERNAME:chan}
    password: ${DB_PASSWORD:123}
    driver-class-name: org.postgresql.Driver
  flyway:
    default-schema: user_service
    schemas: user_service
    create-schemas: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: user-service
      auto-offset-reset: earliest
      enable-auto-commit: false
  grpc:
    server:
      port: ${USER_GRPC_SERVER_PORT:9081}
    client:
      channel:
        product-service:
          target: static://${PRODUCT_GRPC_HOST:localhost}:${PRODUCT_GRPC_PORT:9082}

jwt:
  private-key: ${JWT_PRIVATE_KEY}
  public-key: ${JWT_PUBLIC_KEY}
  access-token-expire-seconds: 900
  refresh-token-expire-seconds: 604800

eureka:
  client:
    enabled: false

cors:
  allowed-origins: "http://localhost:3000"

user:
  kafka:
    consumer:
      settlement:
        topic: settlement-events
    listener:
      settlement:
        enabled: false   # 통합 검증 시 true
