apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: apigateway
  labels:
    app.kubernetes.io/name: apigateway
    app.kubernetes.io/part-of: prompthub
    app.kubernetes.io/component: gateway
    app.kubernetes.io/managed-by: kustomize
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: apigateway
                port:
                  number: 8000
