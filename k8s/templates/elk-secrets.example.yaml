# 예시 전용 파일이다. 실제 비밀번호는 Git에 저장하지 않는다.
# 실제 Secret은 control-plane의 /home/ubuntu/prompthub-secrets/elk-secret.yaml에 mode 600으로 둔다.
apiVersion: v1
kind: Secret
metadata:
  name: logstash-http-credentials
  namespace: elk
type: Opaque
stringData:
  username: example-fluent-bit
  password: example-logstash-http-password
---
apiVersion: v1
kind: Secret
metadata:
  name: kibana-encryption
  namespace: elk
type: Opaque
stringData:
  encrypted-saved-objects-key: replace-with-32-or-more-random-characters
  security-key: replace-with-32-or-more-random-characters
  reporting-key: replace-with-32-or-more-random-characters
