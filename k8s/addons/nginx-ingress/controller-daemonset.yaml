apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nginx-ingress
  namespace: nginx-ingress
  labels:
    app.kubernetes.io/name: nginx-ingress
    app.kubernetes.io/part-of: prompthub
    app.kubernetes.io/component: ingress
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/version: "5.5.1"
spec:
  revisionHistoryLimit: 2
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nginx-ingress
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nginx-ingress
        app.kubernetes.io/part-of: prompthub
        app.kubernetes.io/component: ingress
        app.kubernetes.io/managed-by: kustomize
        app.kubernetes.io/version: "5.5.1"
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      serviceAccountName: nginx-ingress
      automountServiceAccountToken: true
      terminationGracePeriodSeconds: 30
      nodeSelector:
        prompthub.io/node-pool: application
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nginx-ingress
          image: nginx/nginx-ingress:5.5.1@sha256:85b835a6a8d1958f51ce94f0f1e7af833e63731add98eca1d15b11b75ebd50c6
          imagePullPolicy: IfNotPresent
          args:
            - -nginx-configmaps=$(POD_NAMESPACE)/nginx-config
            - -ingress-class=nginx
            - -enable-custom-resources=false
            - -allow-empty-ingress-host
            - -watch-namespace=prompthub
            - -enable-telemetry-reporting=false
            - -enable-leader-election=false
            - -nginx-status-port=18080
            - -ready-status-port=18081
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
            - name: https
              containerPort: 443
              protocol: TCP
            - name: nginx-status
              containerPort: 18080
              protocol: TCP
            - name: readiness
              containerPort: 18081
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            runAsUser: 101
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          startupProbe:
            httpGet:
              path: /nginx-ready
              port: readiness
            periodSeconds: 2
            timeoutSeconds: 1
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /nginx-ready
              port: readiness
            periodSeconds: 5
            timeoutSeconds: 1
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /nginx-ready
              port: readiness
            periodSeconds: 10
            timeoutSeconds: 1
            failureThreshold: 3
