apiVersion: v1
kind: Service
metadata:
  name: kibana
  namespace: elk
  labels:
    app.kubernetes.io/name: kibana
    app.kubernetes.io/part-of: prompthub
    app.kubernetes.io/component: observability
    app.kubernetes.io/managed-by: kustomize
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: kibana
  ports:
    - name: http
      port: 5601
      targetPort: http
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kibana
  namespace: elk
  labels:
    app.kubernetes.io/name: kibana
    app.kubernetes.io/part-of: prompthub
    app.kubernetes.io/component: observability
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 1
  revisionHistoryLimit: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kibana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kibana
        app.kubernetes.io/part-of: prompthub
        app.kubernetes.io/component: observability
        app.kubernetes.io/managed-by: kustomize
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      terminationGracePeriodSeconds: 30
      nodeSelector:
        prompthub.io/node-pool: control-stateful
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: kibana
          image: docker.elastic.co/kibana/kibana:9.4.3
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5601
              protocol: TCP
          env:
            - name: ELASTICSEARCH_HOSTS
              value: '["http://elasticsearch.elk.svc.cluster.local:9200"]'
            - name: XPACK_SECURITY_ENABLED
              value: "false"
            - name: SERVER_HOST
              value: 0.0.0.0
            - name: XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY
              valueFrom:
                secretKeyRef:
                  name: kibana-encryption
                  key: encrypted-saved-objects-key
            - name: XPACK_SECURITY_ENCRYPTIONKEY
              valueFrom:
                secretKeyRef:
                  name: kibana-encryption
                  key: security-key
            - name: XPACK_REPORTING_ENCRYPTIONKEY
              valueFrom:
                secretKeyRef:
                  name: kibana-encryption
                  key: reporting-key
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          startupProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 120
          readinessProbe:
            httpGet:
              path: /api/status
              port: http
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /api/status
              port: http
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
