apiVersion: v1
kind: Namespace
metadata:
  name: elk
  labels:
    app.kubernetes.io/part-of: prompthub
    app.kubernetes.io/managed-by: kustomize
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: elasticsearch-local-pv
  labels:
    app.kubernetes.io/name: elasticsearch
    app.kubernetes.io/part-of: prompthub
    app.kubernetes.io/component: observability
    app.kubernetes.io/managed-by: kustomize
    prompthub.io/volume: elasticsearch
spec:
  capacity:
    storage: 10Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  local:
    path: /var/lib/prompthub/elasticsearch
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: prompthub.io/node-pool
              operator: In
              values:
                - control-stateful
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: elasticsearch-data
  namespace: elk
  labels:
    app.kubernetes.io/name: elasticsearch
    app.kubernetes.io/part-of: prompthub
    app.kubernetes.io/component: observability
    app.kubernetes.io/managed-by: kustomize
spec:
  accessModes:
    - ReadWriteOnce
  volumeMode: Filesystem
  storageClassName: local-storage
  selector:
    matchLabels:
      prompthub.io/volume: elasticsearch
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch-headless
  namespace: elk
  labels:
    app.kubernetes.io/name: elasticsearch
    app.kubernetes.io/part-of: prompthub
    app.kubernetes.io/component: observability
    app.kubernetes.io/managed-by: kustomize
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: elasticsearch
  ports:
    - name: http
      port: 9200
      targetPort: http
      protocol: TCP
    - name: transport
      port: 9300
      targetPort: transport
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: elk
  labels:
    app.kubernetes.io/name: elasticsearch
    app.kubernetes.io/part-of: prompthub
    app.kubernetes.io/component: observability
    app.kubernetes.io/managed-by: kustomize
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: elasticsearch
  ports:
    - name: http
      port: 9200
      targetPort: http
      protocol: TCP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: elasticsearch
  namespace: elk
  labels:
    app.kubernetes.io/name: elasticsearch
    app.kubernetes.io/part-of: prompthub
    app.kubernetes.io/component: observability
    app.kubernetes.io/managed-by: kustomize
spec:
  serviceName: elasticsearch-headless
  replicas: 1
  revisionHistoryLimit: 1
  updateStrategy:
    type: OnDelete
  selector:
    matchLabels:
      app.kubernetes.io/name: elasticsearch
  template:
    metadata:
      labels:
        app.kubernetes.io/name: elasticsearch
        app.kubernetes.io/part-of: prompthub
        app.kubernetes.io/component: observability
        app.kubernetes.io/managed-by: kustomize
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      terminationGracePeriodSeconds: 120
      nodeSelector:
        prompthub.io/node-pool: control-stateful
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: verify-vm-max-map-count
          image: busybox:1.37.0
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              current="$(sysctl -n vm.max_map_count)"
              test "${current}" -ge 1048576
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 5m
              memory: 8Mi
            limits:
              cpu: 50m
              memory: 32Mi
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:9.4.3
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9200
              protocol: TCP
            - name: transport
              containerPort: 9300
              protocol: TCP
          env:
            - name: discovery.type
              value: single-node
            - name: xpack.security.enabled
              value: "false"
            - name: ES_JAVA_OPTS
              value: -Xms512m -Xmx512m
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 1Gi
          startupProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 60
          readinessProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: http
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: elasticsearch-data
              mountPath: /usr/share/elasticsearch/data
      volumes:
        - name: elasticsearch-data
          persistentVolumeClaim:
            claimName: elasticsearch-data
