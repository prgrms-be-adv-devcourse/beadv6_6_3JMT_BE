apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: prompthub
    app.kubernetes.io/component: infrastructure
    app.kubernetes.io/managed-by: kustomize
spec:
  serviceName: postgres-headless
  replicas: 1
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/part-of: prompthub
        app.kubernetes.io/component: infrastructure
        app.kubernetes.io/managed-by: kustomize
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      nodeSelector:
        prompthub.io/node-pool: control-stateful
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      securityContext:
        fsGroup: 70
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: postgres
          image: postgres:18.4-alpine
          imagePullPolicy: IfNotPresent
          args:
            - -c
            - timezone=Asia/Seoul
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          env:
            - name: TZ
              value: Asia/Seoul
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: USER_SERVICE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: USER_SERVICE_PASSWORD
            - name: PRODUCT_SERVICE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: PRODUCT_SERVICE_PASSWORD
            - name: ORDER_SERVICE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: ORDER_SERVICE_PASSWORD
            - name: PAYMENT_SERVICE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: PAYMENT_SERVICE_PASSWORD
            - name: SETTLEMENT_SERVICE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: SETTLEMENT_SERVICE_PASSWORD
          resources:
            requests:
              cpu: 300m
              memory: 512Mi
            limits:
              cpu: 800m
              memory: 1Gi
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 30
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d/01-init-schemas-and-roles.sh
              subPath: 01-init-schemas-and-roles.sh
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data
        - name: init-scripts
          configMap:
            name: postgres-init
            defaultMode: 0550
