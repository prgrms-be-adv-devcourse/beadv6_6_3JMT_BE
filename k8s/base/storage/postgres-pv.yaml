apiVersion: v1
kind: PersistentVolume
metadata:
  name: postgres-local-pv
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: prompthub
    app.kubernetes.io/component: infrastructure
    app.kubernetes.io/managed-by: kustomize
    prompthub.io/volume: postgres
spec:
  capacity:
    storage: 20Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  local:
    path: /var/lib/prompthub/postgres
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: prompthub.io/node-pool
              operator: In
              values:
                - control-stateful
