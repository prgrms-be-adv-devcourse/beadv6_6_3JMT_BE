apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  labels:
    app.kubernetes.io/name: ai-service
    app.kubernetes.io/part-of: prompthub
    app.kubernetes.io/component: service
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 1
  revisionHistoryLimit: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-service
        app.kubernetes.io/part-of: prompthub
        app.kubernetes.io/component: service
        app.kubernetes.io/managed-by: kustomize
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      terminationGracePeriodSeconds: 30
      nodeSelector:
        prompthub.io/node-pool: application
      imagePullSecrets:
        - name: ghcr-pull-secret
      initContainers:
        - name: wait-for-dependencies
          image: busybox:1.37.0
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              until wget -q -O /dev/null http://discovery:8761/actuator/health; do sleep 2; done
              until wget -q -O /dev/null http://config:8888/actuator/health; do sleep 2; done
              until nc -z redis 6379; do sleep 2; done
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 5m
              memory: 8Mi
            limits:
              cpu: 50m
              memory: 32Mi
      containers:
        - name: ai-service
          image: ghcr.io/prgrms-be-adv-devcourse/prompthub-ai-service@sha256:3b59e5e5f05e9bf84fe48365022684148c33530b4cb071fcee0bdc3a82f945ab
          imagePullPolicy: IfNotPresent
          args:
            - --spring.grpc.client.channel.user-service.target=static://user-service:$(USER_GRPC_SERVER_PORT)
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 18087
              protocol: TCP
          env:
            - name: SPRING_CONFIG_IMPORT
              valueFrom:
                secretKeyRef:
                  name: runtime-secret
                  key: SPRING_CONFIG_IMPORT
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              valueFrom:
                secretKeyRef:
                  name: runtime-secret
                  key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: runtime-secret
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                secretKeyRef:
                  name: runtime-secret
                  key: REDIS_PORT
            - name: USER_GRPC_SERVER_PORT
              valueFrom:
                secretKeyRef:
                  name: runtime-secret
                  key: USER_GRPC_SERVER_PORT
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-secret
                  key: OPENAI_API_KEY
            - name: AI_USER_GRPC_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ai-secret
                  key: AI_USER_GRPC_TOKEN
            - name: OPENAI_REASONING_EFFORT
              value: "low"
            - name: AI_SETTLEMENT_CHAT_ENABLED
              value: "true"
            - name: AI_MAX_CONCURRENT_RUNS
              value: "4"
            - name: MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED
              value: "true"
            - name: JAVA_TOOL_OPTIONS
              value: -XX:InitialRAMPercentage=25.0 -XX:MaxRAMPercentage=70.0 -XX:+ExitOnOutOfMemoryError
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
