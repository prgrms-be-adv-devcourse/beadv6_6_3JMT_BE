apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  labels:
    app.kubernetes.io/name: payment-service
    app.kubernetes.io/part-of: prompthub
    app.kubernetes.io/component: service
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 1
  revisionHistoryLimit: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: payment-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: payment-service
        app.kubernetes.io/part-of: prompthub
        app.kubernetes.io/component: service
        app.kubernetes.io/managed-by: kustomize
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      terminationGracePeriodSeconds: 30
      nodeSelector:
        prompthub.io/node-pool: application
      imagePullSecrets:
        - name: ghcr-pull-secret
      initContainers:
        - name: wait-for-dependencies
          image: busybox:1.37.0
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              until wget -q -O /dev/null http://discovery:8761/actuator/health; do sleep 2; done
              until wget -q -O /dev/null http://config:8888/actuator/health; do sleep 2; done
              until nc -z postgres 5432; do sleep 2; done
              until nc -z kafka 9092; do sleep 2; done
          resources:
            requests:
              cpu: 5m
              memory: 8Mi
            limits:
              cpu: 50m
              memory: 32Mi
      containers:
        - name: payment-service
          image: ghcr.io/prgrms-be-adv-devcourse/prompthub-payment-service@sha256:4949f9cddb1719e95c01664606c5b204bce61711a89f6d79c600954db22d2a94
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 18084
              protocol: TCP
            - name: grpc
              containerPort: 9084
              protocol: TCP
          env:
            - name: SPRING_CONFIG_IMPORT
              valueFrom:
                secretKeyRef:
                  name: runtime-secret
                  key: SPRING_CONFIG_IMPORT
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              valueFrom:
                secretKeyRef:
                  name: runtime-secret
                  key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
            - name: POSTGRES_HOST
              valueFrom:
                secretKeyRef:
                  name: runtime-secret
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                secretKeyRef:
                  name: runtime-secret
                  key: POSTGRES_PORT
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              value: payment_service
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: PAYMENT_SERVICE_PASSWORD
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                secretKeyRef:
                  name: runtime-secret
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: PAYMENT_GRPC_SERVER_PORT
              valueFrom:
                secretKeyRef:
                  name: runtime-secret
                  key: PAYMENT_GRPC_SERVER_PORT
            - name: SPRING_GRPC_SERVER_PORT
              valueFrom:
                secretKeyRef:
                  name: runtime-secret
                  key: PAYMENT_GRPC_SERVER_PORT
            - name: ORDER_GRPC_SERVER_PORT
              valueFrom:
                secretKeyRef:
                  name: runtime-secret
                  key: ORDER_GRPC_SERVER_PORT
            - name: SPRING_GRPC_CLIENT_CHANNEL_ORDER_TARGET
              value: static://order-service:$(ORDER_GRPC_SERVER_PORT)
            - name: TOSS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: payment-secret
                  key: TOSS_SECRET_KEY
            - name: TOSS_TEST_MODE
              valueFrom:
                secretKeyRef:
                  name: payment-secret
                  key: TOSS_TEST_MODE
            - name: MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED
              value: "true"
            - name: JAVA_TOOL_OPTIONS
              value: -XX:InitialRAMPercentage=25.0 -XX:MaxRAMPercentage=70.0 -XX:+ExitOnOutOfMemoryError
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
