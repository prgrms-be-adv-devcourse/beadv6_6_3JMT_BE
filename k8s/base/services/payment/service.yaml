apiVersion: v1
kind: Service
metadata:
  name: payment-service
  labels:
    app.kubernetes.io/name: payment-service
    app.kubernetes.io/part-of: prompthub
    app.kubernetes.io/component: service
    app.kubernetes.io/managed-by: kustomize
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: payment-service
  ports:
    - name: http
      port: 8084
      targetPort: http
      protocol: TCP
    - name: grpc
      port: 9084
      targetPort: grpc
      protocol: TCP
