apiVersion: apps/v1
kind: Deployment
metadata:
  name: apigateway
  labels:
    app.kubernetes.io/name: apigateway
    app.kubernetes.io/part-of: prompthub
    app.kubernetes.io/component: gateway
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: apigateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: apigateway
        app.kubernetes.io/part-of: prompthub
        app.kubernetes.io/component: gateway
        app.kubernetes.io/managed-by: kustomize
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      terminationGracePeriodSeconds: 30
      nodeSelector:
        prompthub.io/node-pool: application
      imagePullSecrets:
        - name: ghcr-pull-secret
      initContainers:
        - name: wait-for-platform
          image: busybox:1.37.0
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              until wget -q -O /dev/null http://discovery:8761/actuator/health; do sleep 2; done
              until wget -q -O /dev/null http://config:8888/actuator/health; do sleep 2; done
          resources:
            requests:
              cpu: 5m
              memory: 8Mi
            limits:
              cpu: 50m
              memory: 32Mi
      containers:
        - name: apigateway
          image: ghcr.io/prgrms-be-adv-devcourse/prompthub-apigateway@sha256:f43cee6a865544eb97566b4569596011437cf7a8cbdeb22e3bd994f8e687938a
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: SPRING_CONFIG_IMPORT
              valueFrom:
                secretKeyRef:
                  name: runtime-secret
                  key: SPRING_CONFIG_IMPORT
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              valueFrom:
                secretKeyRef:
                  name: runtime-secret
                  key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
            - name: JWT_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: JWT_PUBLIC_KEY
            - name: CORS_ALLOWED_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: runtime-secret
                  key: CORS_ALLOWED_ORIGINS
            - name: MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED
              value: "true"
            - name: JAVA_TOOL_OPTIONS
              value: -XX:InitialRAMPercentage=25.0 -XX:MaxRAMPercentage=70.0 -XX:+ExitOnOutOfMemoryError
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
