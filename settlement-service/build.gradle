plugins {
	id 'java'
	id 'org.springframework.boot' version '4.0.6'
	id 'io.spring.dependency-management' version '1.1.7'
	id 'com.google.protobuf' version '0.9.4'
	id 'checkstyle'
}

group = 'com.prompthub'
version = '0.0.1-SNAPSHOT'
description = 'settlement'

ext {
	grpcVersion = '1.80.0'
	protobufVersion = '4.28.2'
	springCloudVersion = '2025.1.2'
}

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(21)
	}
}

checkstyle {
	configFile = file('../style/checkstyle/prompthub-checkstyle-rules.xml')
	toolVersion = '10.12.0'
	ignoreFailures = true
}

tasks.named('checkstyleTest') {
	enabled = false
}

repositories {
	mavenCentral()
}

dependencies {

	implementation 'com.prompthub:common-module'

	implementation 'org.springframework.boot:spring-boot-starter-validation'
	implementation 'org.springframework.boot:spring-boot-starter-webmvc'

	implementation 'org.springdoc:springdoc-openapi-starter-webmvc-ui:2.8.9'

	compileOnly 'org.projectlombok:lombok'
	annotationProcessor 'org.projectlombok:lombok'

	implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
	runtimeOnly 'org.postgresql:postgresql'

	//service discovery (Eureka) + config server
	implementation 'org.springframework.cloud:spring-cloud-starter-netflix-eureka-client'
	implementation 'org.springframework.cloud:spring-cloud-starter-config'

	//batch
	implementation 'org.springframework.boot:spring-boot-starter-batch'

	//kafka
	implementation 'org.springframework.boot:spring-boot-starter-kafka'

	//grpc (타 서비스 동기 호출 — User 판매자명, Product 상품 수)
	implementation "io.grpc:grpc-stub:${grpcVersion}"
	implementation "io.grpc:grpc-protobuf:${grpcVersion}"
	runtimeOnly "io.grpc:grpc-netty-shaded:${grpcVersion}"
	implementation "com.google.protobuf:protobuf-java:${protobufVersion}"
	compileOnly 'org.apache.tomcat:annotations-api:6.0.53'

	testImplementation 'org.springframework.boot:spring-boot-starter-data-jpa-test'
	testImplementation 'org.springframework.boot:spring-boot-starter-validation-test'
	testImplementation 'org.springframework.boot:spring-boot-starter-webmvc-test'
	testCompileOnly 'org.projectlombok:lombok'
	testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
	testAnnotationProcessor 'org.projectlombok:lombok'
}

protobuf {
	protoc {
		artifact = "com.google.protobuf:protoc:${protobufVersion}"
	}
	plugins {
		grpc {
			artifact = "io.grpc:protoc-gen-grpc-java:${grpcVersion}"
		}
	}
	generateProtoTasks {
		all().each { task ->
			task.plugins {
				grpc {}
			}
		}
	}
}

dependencyManagement {
	imports {
		mavenBom "org.springframework.cloud:spring-cloud-dependencies:${springCloudVersion}"
	}
}

tasks.named('test') {
	useJUnitPlatform()
}
