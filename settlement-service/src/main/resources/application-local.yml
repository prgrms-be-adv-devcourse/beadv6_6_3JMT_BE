server:
  port: 8085

spring:
  cloud:
    config:
      enabled: false
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:promptHub}
    username: ${DB_USERNAME:promptHub}
    password: ${DB_PASSWORD:promptHub}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-only
    open-in-view: false
  batch:
    job:
      enabled: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: settlement-service
      auto-offset-reset: earliest
      enable-auto-commit: false

grpc:
  server:
    port: 9085

settlement:
  scheduler:
    cron: "0 0 4 1 * *"
  kafka:
    listener:
      order:
        enabled: false

eureka:
  client:
    enabled: false
