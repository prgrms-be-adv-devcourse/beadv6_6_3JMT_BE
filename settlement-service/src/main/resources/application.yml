spring:
  application:
    name: settlement-service
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
  profiles:
    default: local
  cloud:
    config:
      fail-fast: true
      retry:
        max-attempts: 6
        initial-interval: 1000
        max-interval: 2000
        multiplier: 1.1

# 운영 설정은 config server(configs/settlement-service.yml)에서 주입한다.
# 아래는 config server 없이 로컬 실행할 때를 위한 fallback 이다.
settlement:
  kafka:
    producer:
      topic: settlement-events

api:
  init: /api/v1
