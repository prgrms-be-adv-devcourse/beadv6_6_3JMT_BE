spring:
  application:
    name: settlement
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:promptHub}
    username: ${DB_USERNAME:promptHub}
    password: ${DB_PASSWORD:promptHub}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  batch:
    job:
      enabled: false

settlement:
  scheduler:
    cron: "0 0 4 1 * *"

api:
  init: /api/v1
