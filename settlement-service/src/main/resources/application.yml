spring:
  application:
    name: settlement-service
  config:
    import: ${CONFIG_IMPORT:}
  cloud:
    config:
      fail-fast: true
      retry:
        max-attempts: 6
        initial-interval: 1000
        max-interval: 2000
        multiplier: 1.1
  batch:
    job:
      enabled: false

api:
  init: /api/v2

settlement:
  execution:
    mode: service
  restart:
    batch-id: ${SETTLEMENT_RESTART_BATCH_ID:}
    actor-id: ${SETTLEMENT_RESTART_ACTOR_ID:}
  batch:
    chunk-size: ${SETTLEMENT_BATCH_CHUNK_SIZE:100}
  manual-api:
    enabled: false
