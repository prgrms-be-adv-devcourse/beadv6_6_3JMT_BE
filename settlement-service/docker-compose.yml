services:
  postgres:
    container_name: promptHub
    image: 'postgres:18.4-alpine'
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_INITDB_ARGS="--encoding=UTF-8"
    volumes:
      - pg-data:/var/lib/postgresql
    restart: always
    ports:
      - '5432:5432'
    env_file:
      - ./.env

volumes:
  pg-data: