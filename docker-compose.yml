# 루트 배포용 docker-compose (EC2 self-hosted 러너 빌드 + compose)
# 짝 워크플로우: .github/workflows/cd-selfhosted-compose.yml
# env(.env)는 EC2에 두고 `docker compose --env-file .env up -d --build` 로 주입

services:

  # ----- 인프라 -----
  postgres:
    image: postgres:18.4-alpine
    container_name: prompthub-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}          # DB 계정
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}  # DB 비밀번호
      POSTGRES_DB: ${POSTGRES_DB}              # 기본 DB 이름
    volumes:
      - pg-data:/var/lib/postgresql            # 데이터 영속 볼륨(postgres 18+ 권장 마운트 경로)
    restart: always
    networks: [prompthub]
    ports: ["127.0.0.1:5432:5432"]            # SSH 터널 DB 접속용 loopback 노출(외부 차단)

  kafka:
    image: confluentinc/cp-kafka:7.8.0
    container_name: prompthub-kafka
    environment:
      KAFKA_NODE_ID: 1                                                      # 노드 ID
      KAFKA_PROCESS_ROLES: broker,controller                               # KRaft 역할(브로커+컨트롤러)
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093                          # 컨트롤러 쿼럼
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER                          # 컨트롤러 리스너 이름
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT  # 리스너 보안 프로토콜
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093  # 수신 주소
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT                          # 브로커 간 리스너
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092                   # 클라이언트 접속 주소(컨테이너명)
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1                            # 오프셋 토픽 복제수
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1                    # 트랜잭션 로그 복제수
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1                               # 트랜잭션 로그 최소 ISR
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0                            # 리밸런스 지연(ms)
      KAFKA_NUM_PARTITIONS: 1                                              # 기본 파티션 수
      CLUSTER_ID: 5L6g3nShT-eMCtK--X86sw                                   # KRaft 클러스터 ID
    restart: always
    networks: [prompthub]

  # ----- Spring Cloud 코어(앱보다 먼저) -----
  discovery:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: discovery
        MODULE_PATH: discovery
    container_name: discovery
    ports: ["8761:8761"]                       # Eureka 대시보드
    healthcheck:                               # 앱 서비스가 등록 전에 먼저 떠서 localhost로 폴백하는 레이스 방지
      test: ["CMD-SHELL", "curl -fsS http://localhost:8761/actuator/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s
    restart: always
    networks: [prompthub]

  config:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: config
        MODULE_PATH: config
    container_name: config
    ports: ["127.0.0.1:8888:8888"]             # 헬스체크용 loopback 노출(외부 차단)
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery:8761/eureka/  # Eureka 주소
    healthcheck:                               # 앱 서비스가 config 수신 전에 떠서 설정을 놓치는 레이스 방지
      test: ["CMD-SHELL", "curl -fsS http://localhost:8888/actuator/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 40s
    depends_on:
      discovery:
        condition: service_healthy
    restart: always
    networks: [prompthub]

  # ----- 비즈니스 서비스 -----
  user-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: user-service
        MODULE_PATH: user-service
    container_name: user-service
    ports: ["127.0.0.1:8081:8081"]             # 헬스체크용 loopback 노출(외부 차단)
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config:8888       # Config Server 주소
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery:8761/eureka/  # Eureka 주소
      POSTGRES_HOST: postgres                                              # DB 호스트
      POSTGRES_PORT: "5432"                                                # DB 포트
      POSTGRES_DB: ${POSTGRES_DB}                                          # DB 이름
      POSTGRES_USER: ${POSTGRES_USER}                                      # DB 계정
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}                              # DB 비밀번호
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092                                  # Kafka 브로커 주소
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}                                  # JWT 서명 키(비공개)
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}                                    # JWT 검증 키(공개)
      USER_GRPC_SERVER_PORT: "9081"                                        # user gRPC 서버 포트
      PRODUCT_GRPC_SERVER_PORT: "9082"                                     # product gRPC 서버 포트
    depends_on:
      postgres:
        condition: service_started
      kafka:
        condition: service_started
      discovery:
        condition: service_healthy
      config:
        condition: service_healthy
    restart: always
    networks: [prompthub]

  product-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: product-service
        MODULE_PATH: product-service
    container_name: product-service
    ports: ["127.0.0.1:8082:8082"]             # 헬스체크용 loopback 노출(외부 차단)
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config:8888       # Config Server 주소
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery:8761/eureka/  # Eureka 주소
      POSTGRES_HOST: postgres                                              # DB 호스트
      POSTGRES_PORT: "5432"                                                # DB 포트
      POSTGRES_DB: ${POSTGRES_DB}                                          # DB 이름
      POSTGRES_USER: ${POSTGRES_USER}                                      # DB 계정
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}                              # DB 비밀번호
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092                                  # Kafka 브로커 주소
      PRODUCT_GRPC_SERVER_PORT: "9082"                                     # product gRPC 서버 포트
      USER_GRPC_SERVER_PORT: "9081"                                        # user gRPC 서버 포트
      AWS_REGION: ${AWS_REGION}                                            # S3 리전
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}                                      # S3 버킷명
    depends_on:
      postgres:
        condition: service_started
      kafka:
        condition: service_started
      discovery:
        condition: service_healthy
      config:
        condition: service_healthy
      user-service:
        condition: service_started
    restart: always
    networks: [prompthub]

  order-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: order-service
        MODULE_PATH: order-service
    container_name: order-service
    ports: ["127.0.0.1:8083:8083"]             # 헬스체크용 loopback 노출(외부 차단)
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config:8888       # Config Server 주소
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery:8761/eureka/  # Eureka 주소
      POSTGRES_HOST: postgres                                              # DB 호스트
      POSTGRES_PORT: "5432"                                                # DB 포트
      POSTGRES_DB: ${POSTGRES_DB}                                          # DB 이름
      POSTGRES_USER: ${POSTGRES_USER}                                      # DB 계정
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}                              # DB 비밀번호
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092                                  # Kafka 브로커 주소
      ORDER_GRPC_SERVER_PORT: "9083"                                       # order gRPC 서버 포트
      PRODUCT_GRPC_SERVER_PORT: "9082"                                     # product gRPC 서버 포트
      USER_GRPC_SERVER_PORT: "9081"                                        # user gRPC 서버 포트
    depends_on:
      postgres:
        condition: service_started
      kafka:
        condition: service_started
      discovery:
        condition: service_healthy
      config:
        condition: service_healthy
      user-service:
        condition: service_started
      product-service:
        condition: service_started
    restart: always
    networks: [prompthub]

  payment-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: payment-service
        MODULE_PATH: payment-service
    container_name: payment-service
    ports: ["127.0.0.1:8084:8084"]             # 헬스체크용 loopback 노출(외부 차단)
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config:8888       # Config Server 주소
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery:8761/eureka/  # Eureka 주소
      POSTGRES_HOST: postgres                                              # DB 호스트
      POSTGRES_PORT: "5432"                                                # DB 포트
      POSTGRES_DB: ${POSTGRES_DB}                                          # DB 이름
      POSTGRES_USER: ${POSTGRES_USER}                                      # DB 계정
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}                              # DB 비밀번호
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092                                  # Kafka 브로커 주소
      TOSS_SECRET_KEY: ${TOSS_SECRET_KEY}                                  # Toss 결제 시크릿 키
      TOSS_TEST_MODE: ${TOSS_TEST_MODE}                                    # Toss 테스트 모드 여부
    depends_on:
      postgres:
        condition: service_started
      kafka:
        condition: service_started
      discovery:
        condition: service_healthy
      config:
        condition: service_healthy
    restart: always
    networks: [prompthub]

  settlement-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: settlement-service
        MODULE_PATH: settlement-service
    container_name: settlement-service
    ports: ["127.0.0.1:8085:8085"]             # 헬스체크용 loopback 노출(외부 차단)
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config:8888       # Config Server 주소
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery:8761/eureka/  # Eureka 주소
      POSTGRES_HOST: postgres                                              # DB 호스트
      POSTGRES_PORT: "5432"                                                # DB 포트
      POSTGRES_DB: ${POSTGRES_DB}                                          # DB 이름
      POSTGRES_USER: ${POSTGRES_USER}                                      # DB 계정
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}                              # DB 비밀번호
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092                                  # Kafka 브로커 주소
      SETTLEMENT_GRPC_SERVER_PORT: "9085"                                  # settlement gRPC 서버 포트
      USER_GRPC_SERVER_PORT: "9081"                                        # user gRPC 서버 포트
      PRODUCT_GRPC_SERVER_PORT: "9082"                                     # product gRPC 서버 포트
    depends_on:
      postgres:
        condition: service_started
      kafka:
        condition: service_started
      discovery:
        condition: service_healthy
      config:
        condition: service_healthy
      user-service:
        condition: service_started
      product-service:
        condition: service_started
    restart: always
    networks: [prompthub]

  admin-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: admin-service
        MODULE_PATH: admin-service
    container_name: admin-service
    ports: ["127.0.0.1:8086:8086"]             # 헬스체크용 loopback 노출(외부 차단)
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config:8888       # Config Server 주소
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery:8761/eureka/  # Eureka 주소
      # admin-service는 정산 DB에 직접 커넥션한다(POSTGRES_* 대신 자체 DB_* 플레이스홀더 사용)
      DB_HOST: postgres                                                    # DB 호스트
      DB_PORT: "5432"                                                      # DB 포트
      DB_NAME: ${POSTGRES_DB}                                              # DB 이름
      DB_USERNAME: ${POSTGRES_USER}                                        # DB 계정
      DB_PASSWORD: ${POSTGRES_PASSWORD}                                    # DB 비밀번호
    depends_on:
      postgres:
        condition: service_started
      discovery:
        condition: service_healthy
      config:
        condition: service_healthy
      settlement-service:                                                  # 정산 스키마 소유자, ddl-auto: none
        condition: service_started
    restart: always
    networks: [prompthub]

  # ----- 게이트웨이(외부 진입점) -----
  apigateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: apigateway
        MODULE_PATH: apigateway
    container_name: apigateway
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config:8888       # Config Server 주소
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery:8761/eureka/  # Eureka 주소
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}                                   # JWT 검증 키(공개)
      CORS_ALLOWED_ORIGINS: https://prompthub-fe.vercel.app,http://localhost:3000  # CORS 허용 오리진(콤마 구분)
    ports: ["80:8000"]                         # 외부 진입 포트(host 80 → gateway 8000, SG 80 오픈)
    depends_on:
      discovery:
        condition: service_healthy
      config:
        condition: service_healthy
      user-service:
        condition: service_started
      product-service:
        condition: service_started
      order-service:
        condition: service_started
      payment-service:
        condition: service_started
      settlement-service:
        condition: service_started
    restart: always
    networks: [prompthub]

volumes:
  pg-data:

networks:
  prompthub:
    driver: bridge
