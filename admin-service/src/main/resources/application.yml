server:
  port: 8086

spring:
  application:
    name: admin-service
  config:
    import: ${CONFIG_IMPORT:}
  datasource:
    # 정산 DB 직접 커넥션 — 어드민은 각 도메인 DB 를 직접 바라본다 (admin-module-separation.md)
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:promptHub}
    username: ${DB_USERNAME:promptHub}
    password: ${DB_PASSWORD:promptHub}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      # 스키마 소유자는 settlement-service — 어드민은 절대 스키마를 만들거나 바꾸지 않는다
      ddl-auto: none
    open-in-view: false

api:
  init: /api/v1

management:
  endpoints:
    web:
      exposure:
        include: health, info
