name: dev-course

services:
  kafka:
    image: apache/kafka:latest
    container_name: dev-course-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

  postgresql:
    image: postgres:18.4-alpine
    container_name: dev-course-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-prompthub}
      POSTGRES_USER: ${DB_USERNAME:-chan}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-123}
    volumes:
      - postgresql-data-v18:/var/lib/postgresql

  redis:
    image: redis:7.4-alpine
    container_name: dev-course-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis-data:/data

volumes:
  postgresql-data-v18:
  redis-data:
