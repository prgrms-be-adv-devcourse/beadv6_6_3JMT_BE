plugins {
    id 'org.springframework.boot' version '4.1.0' apply false
    id 'io.spring.dependency-management' version '1.1.7' apply false
    id 'checkstyle' apply false
    id 'com.google.protobuf' version '0.9.6' apply false
}

allprojects {
    group   = 'com.prompthub'
    version = '0.0.1-SNAPSHOT'

    ext {
        springCloudVersion = '2025.1.2'
        grpcVersion        = '1.80.0'
        protobufVersion    = '4.29.3'
    }

    repositories {
        mavenCentral()
    }
}

subprojects {
    apply plugin: 'java'

    java {
        toolchain {
            languageVersion = JavaLanguageVersion.of(21)
        }
    }

    tasks.withType(Test).configureEach {
        useJUnitPlatform()
    }

    dependencies {
        testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    }
}

// ── Spring Boot 앱 8개 (common-module 제외) ──────────────────────────────────
configure([
    project(':apigateway'),
    project(':config'),
    project(':discovery'),
    project(':order-service'),
    project(':payment-service'),
    project(':product-service'),
    project(':settlement-service'),
    project(':user-service')
]) {
    apply plugin: 'org.springframework.boot'
    apply plugin: 'io.spring.dependency-management'

    dependencyManagement {
        imports {
            mavenBom "org.springframework.cloud:spring-cloud-dependencies:${springCloudVersion}"
        }
    }

    dependencies {
        implementation 'org.springframework.boot:spring-boot-starter-actuator'
    }
}

// ── 비즈니스 서비스 5개 ──────────────────────────────────────────────────────
configure([
    project(':order-service'),
    project(':payment-service'),
    project(':product-service'),
    project(':settlement-service'),
    project(':user-service')
]) {
    apply plugin: 'checkstyle'

    checkstyle {
        configFile = file("${rootProject.projectDir}/style/checkstyle/prompthub-checkstyle-rules.xml")
        toolVersion = '10.12.0'
        ignoreFailures = true
    }

    tasks.named('checkstyleTest') {
        enabled = false
    }

    dependencies {
        implementation project(':common-module')

        compileOnly 'org.projectlombok:lombok'
        annotationProcessor 'org.projectlombok:lombok'
        testCompileOnly 'org.projectlombok:lombok'
        testAnnotationProcessor 'org.projectlombok:lombok'

        implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
        runtimeOnly    'org.postgresql:postgresql'
        implementation 'org.springframework.boot:spring-boot-starter-validation'
        implementation 'org.springframework.cloud:spring-cloud-starter-netflix-eureka-client'
        implementation 'org.springframework.cloud:spring-cloud-starter-config'
    }
}
