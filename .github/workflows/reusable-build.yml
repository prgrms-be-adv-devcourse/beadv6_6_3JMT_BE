name: Reusable Build and Test

on:
  workflow_call:
    inputs:
      module-name:
        required: true
        type: string
      module-path:
        required: true
        type: string

jobs:
  build:
    name: Build & Test (${{ inputs.module-name }})
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: prompthub_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: prompthub_test
      DB_USERNAME: test
      DB_PASSWORD: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: ${{ inputs.module-path }}

      - name: Build and test
        run: ./gradlew clean build --no-daemon
        working-directory: ${{ inputs.module-path }}

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ inputs.module-name }}
          path: ${{ inputs.module-path }}/build/reports/tests/test/
