name: CD - Parallel Self-hosted Compose

on:
  push:
    branches: ["develop", "infra"]
  workflow_dispatch:
    inputs:
      rebuild_all:
        description: "전체 재빌드 여부"
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: cd-selfhosted
  cancel-in-progress: false

env:
  DEPLOY_DIR: /home/ubuntu/prompthub
  COMPOSE_FILE: docker-compose.yml

jobs:
  # ----------------------------------------------------
  # JOB 1: 변경 감지 및 빌드 계획 수립
  # ----------------------------------------------------
  planning:
    name: Plan Build Targets
    runs-on: [self-hosted, linux, deploy]
    outputs:
      deploy: ${{ steps.plan.outputs.deploy }}
      build_matrix: ${{ steps.plan.outputs.build_matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: env 확인
        run: |
          if [ ! -f "${DEPLOY_DIR}/.env" ]; then 
            echo "❌ .env 파일을 찾을 수 없습니다."
            exit 1
          fi

      - name: 변경 모듈 감지
        id: changed
        if: github.event_name == 'push'
        uses: tj-actions/changed-files@v46
        with:
          files_yaml: |
            user_service:
              - user-service/**
            product_service:
              - product-service/**
            order_service:
              - order-service/**
            payment_service:
              - payment-service/**
            settlement_service:
              - settlement-service/**
            admin_service:
              - admin-service/**
            apigateway:
              - apigateway/**
            config:
              - config/**
            discovery:
              - discovery/**
            docker_all:
              - common-module/**
              - Dockerfile
              - docker-compose.yml
              - compose.yml
              - build.gradle.kts
              - settings.gradle.kts
              - gradle/**
              - .github/workflows/**

      - name: 변경 감지 결과 출력
        if: github.event_name == 'push'
        run: |
          echo "user_service=${{ steps.changed.outputs.user_service_any_changed }}"
          echo "product_service=${{ steps.changed.outputs.product_service_any_changed }}"
          echo "order_service=${{ steps.changed.outputs.order_service_any_changed }}"
          echo "payment_service=${{ steps.changed.outputs.payment_service_any_changed }}"
          echo "settlement_service=${{ steps.changed.outputs.settlement_service_any_changed }}"
          echo "admin_service=${{ steps.changed.outputs.admin_service_any_changed }}"
          echo "apigateway=${{ steps.changed.outputs.apigateway_any_changed }}"
          echo "config=${{ steps.changed.outputs.config_any_changed }}"
          echo "discovery=${{ steps.changed.outputs.discovery_any_changed }}"
          echo "docker_all=${{ steps.changed.outputs.docker_all_any_changed }}"

      - name: 빌드 대상 결정 및 JSON 배열화
        id: plan
        shell: bash
        run: |
          # 1. 수동 실행이거나, 공통/전역 파일이 변경된 경우 전체 빌드
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.rebuild_all }}" = "true" ]; then
            SERVICES_JSON='["discovery","config","user-service","product-service","order-service","payment-service","settlement-service","admin-service","apigateway"]'
            DEPLOY="true"
          elif [ "${{ steps.changed.outputs.docker_all_any_changed }}" = "true" ]; then
            SERVICES_JSON='["discovery","config","user-service","product-service","order-service","payment-service","settlement-service","admin-service","apigateway"]'
            DEPLOY="true"
          else
            # 2. 변경된 서비스만 배열에 추가
            SERVICES=()
            [ "${{ steps.changed.outputs.user_service_any_changed }}" = "true" ] && SERVICES+=("user-service")
            [ "${{ steps.changed.outputs.product_service_any_changed }}" = "true" ] && SERVICES+=("product-service")
            [ "${{ steps.changed.outputs.order_service_any_changed }}" = "true" ] && SERVICES+=("order-service")
            [ "${{ steps.changed.outputs.payment_service_any_changed }}" = "true" ] && SERVICES+=("payment-service")
            [ "${{ steps.changed.outputs.settlement_service_any_changed }}" = "true" ] && SERVICES+=("settlement-service")
            [ "${{ steps.changed.outputs.admin_service_any_changed }}" = "true" ] && SERVICES+=("admin-service")
            [ "${{ steps.changed.outputs.apigateway_any_changed }}" = "true" ] && SERVICES+=("apigateway")
            [ "${{ steps.changed.outputs.config_any_changed }}" = "true" ] && SERVICES+=("config")
            [ "${{ steps.changed.outputs.discovery_any_changed }}" = "true" ] && SERVICES+=("discovery")
          
            # 3. jq를 사용해 안전하게 JSON 변환
            if [ ${#SERVICES[@]} -eq 0 ]; then
              SERVICES_JSON="[]"
              DEPLOY="false"
            else
              SERVICES_JSON=$(printf '%s\n' "${SERVICES[@]}" | jq -R . | jq -s -c .)
              DEPLOY="true"
            fi
          fi
          
          echo "결정된 빌드 매트릭스: $SERVICES_JSON"
          echo "build_matrix=${SERVICES_JSON}" >> "$GITHUB_OUTPUT"
          echo "deploy=${DEPLOY}" >> "$GITHUB_OUTPUT"

  # ----------------------------------------------------
  # JOB 2: 서비스별 독립적/병렬 이미지 빌드 (동시 실행)
  # ----------------------------------------------------
  parallel-build:
    name: Build -> ${{ matrix.service }}
    needs: planning
    if: needs.planning.outputs.deploy == 'true' && needs.planning.outputs.build_matrix != '[]'
    runs-on: [self-hosted, linux, deploy]
    strategy:
      matrix:
        service: ${{ fromJson(needs.planning.outputs.build_matrix) }}
      fail-fast: false # 하나가 실패해도 다른 서비스 빌드는 끝까지 진행
    steps:
      - uses: actions/checkout@v4
        # fetch-depth: 0 제거 -> 병렬 Job의 빠른 체크아웃(Shallow clone)을 유도

      - name: Parallel Docker Build
        run: |
          echo "🚀 ${{ matrix.service }} 이미지를 빌드합니다."
          docker compose -f "${COMPOSE_FILE}" --env-file "${DEPLOY_DIR}/.env" \
            build ${{ matrix.service }}

  # ----------------------------------------------------
  # JOB 3: 배포 및 순차 헬스체크 실행 (기존 순서 보장)
  # ----------------------------------------------------
  deploy-and-health:
    name: Run & Health Check
    needs: [planning, parallel-build]
    # always()를 제거하여, JOB 2의 병렬 빌드가 모두 성공(Success)했을 때만 배포되도록 보호
    if: needs.planning.outputs.deploy == 'true'
    runs-on: [self-hosted, linux, deploy]
    steps:
      - uses: actions/checkout@v4

      - name: Up containers (No Build, Just Run)
        run: |
          echo "🚀 업데이트된 서비스 기동 시작"
          # jq의 join(" ") 기능을 이용해 배열을 공백으로 구분된 문자열로 변환
          SERVICES_STR=$(echo '${{ needs.planning.outputs.build_matrix }}' | jq -r 'join(" ")')
          
          if [ -n "$SERVICES_STR" ]; then
            echo "실행 대상: $SERVICES_STR"
            docker compose -f "${COMPOSE_FILE}" --env-file "${DEPLOY_DIR}/.env" \
              up -d $SERVICES_STR --remove-orphans
          else
            echo "실행할 서비스가 없습니다."
          fi

      # 이후 기존 스텝 6(Health Check) 및 6.5(Restart Config-only) 등 추가 로직 유지