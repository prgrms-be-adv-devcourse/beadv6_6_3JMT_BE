name: CI

on:
  pull_request:
    branches:
      - develop
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: ci-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    outputs:
      user_service:       ${{ steps.filter.outputs.user_service_any_changed }}
      product_service:    ${{ steps.filter.outputs.product_service_any_changed }}
      payment_service:    ${{ steps.filter.outputs.payment_service_any_changed }}
      order_service:      ${{ steps.filter.outputs.order_service_any_changed }}
      settlement_service: ${{ steps.filter.outputs.settlement_service_any_changed }}
      admin_service:      ${{ steps.filter.outputs.admin_service_any_changed }}
      apigateway:         ${{ steps.filter.outputs.apigateway_any_changed }}
      config:             ${{ steps.filter.outputs.config_any_changed }}
      discovery:          ${{ steps.filter.outputs.discovery_any_changed }}
      common_module:      ${{ steps.filter.outputs.common_module_any_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 변경된 파일 감지
        id: filter
        uses: tj-actions/changed-files@v46
        with:
          files_yaml: |
            user_service:
              - user-service/**
            product_service:
              - product-service/**
            payment_service:
              - payment-service/**
            order_service:
              - order-service/**
            settlement_service:
              - settlement-service/**
            admin_service:
              - admin-service/**
            apigateway:
              - apigateway/**
            config:
              - config/**
            discovery:
              - discovery/**
            common_module:
              - common-module/**

  user_service_ci:
    needs: changes
    if: needs.changes.outputs.user_service == 'true' || needs.changes.outputs.common_module == 'true'
    uses: ./.github/workflows/reusable-build.yml
    with:
      module-name: user-service
      module-path: user-service

  product_service_ci:
    needs: changes
    if: needs.changes.outputs.product_service == 'true' || needs.changes.outputs.common_module == 'true'
    uses: ./.github/workflows/reusable-build.yml
    with:
      module-name: product-service
      module-path: product-service

  payment_service_ci:
    needs: changes
    if: needs.changes.outputs.payment_service == 'true' || needs.changes.outputs.common_module == 'true'
    uses: ./.github/workflows/reusable-build.yml
    with:
      module-name: payment-service
      module-path: payment-service

  order_service_ci:
    needs: changes
    if: needs.changes.outputs.order_service == 'true' || needs.changes.outputs.common_module == 'true'
    uses: ./.github/workflows/reusable-build.yml
    with:
      module-name: order-service
      module-path: order-service

  settlement_service_ci:
    needs: changes
    if: needs.changes.outputs.settlement_service == 'true' || needs.changes.outputs.common_module == 'true'
    uses: ./.github/workflows/reusable-build.yml
    with:
      module-name: settlement-service
      module-path: settlement-service

  admin_service_ci:
    needs: changes
    if: needs.changes.outputs.admin_service == 'true' || needs.changes.outputs.common_module == 'true'
    uses: ./.github/workflows/reusable-build.yml
    with:
      module-name: admin-service
      module-path: admin-service

  apigateway_ci:
    needs: changes
    if: needs.changes.outputs.apigateway == 'true'
    uses: ./.github/workflows/reusable-build.yml
    with:
      module-name: apigateway
      module-path: apigateway

  config_ci:
    needs: changes
    if: needs.changes.outputs.config == 'true'
    uses: ./.github/workflows/reusable-build.yml
    with:
      module-name: config
      module-path: config

  discovery_ci:
    needs: changes
    if: needs.changes.outputs.discovery == 'true'
    uses: ./.github/workflows/reusable-build.yml
    with:
      module-name: discovery
      module-path: discovery

  common_module_ci:
    needs: changes
    if: needs.changes.outputs.common_module == 'true'
    uses: ./.github/workflows/reusable-build.yml
    with:
      module-name: common-module
      module-path: common-module

  ci-gate:
    needs:
      - changes
      - user_service_ci
      - product_service_ci
      - payment_service_ci
      - order_service_ci
      - settlement_service_ci
      - admin_service_ci
      - apigateway_ci
      - config_ci
      - discovery_ci
      - common_module_ci
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: CI 결과 확인
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          for result in $results; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "CI 실패: $result"
              exit 1
            fi
          done
          echo "모든 CI 통과 (skipped 포함)"
