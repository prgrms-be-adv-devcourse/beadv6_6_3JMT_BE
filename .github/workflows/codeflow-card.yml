name: CodeFlow Card
on:
  push:
    branches: [main, develop]
  pull_request:
    types: [closed]
  workflow_dispatch:

jobs:
  card:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: braedonsaunders/codeflow/card@v1
        with:
          style: compact
          show-grade: true
          show-score: true
          accent: blue
          receipts: true
