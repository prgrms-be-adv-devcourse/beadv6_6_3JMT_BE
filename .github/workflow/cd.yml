# GitHub Actions 탭에 표시될 CD workflow 이름
name: PromptHub CD with Gradle

# 배포에 공통으로 사용할 환경 변수
env:
  # 프로젝트 이름
  # S3 업로드 경로 등에 사용됩니다.
  PROJECT_NAME: prompt-hub

  # 배포 zip 파일을 업로드할 S3 버킷 이름
  # 실제 AWS S3에 동일한 이름의 버킷이 생성되어 있어야 합니다.
  BUCKET_NAME: prompt-hub-deploy-bucket

  # AWS CodeDeploy Application 이름
  # 실제 AWS CodeDeploy에 동일한 Application이 생성되어 있어야 합니다.
  CODE_DEPLOY_APP_NAME: prompt-hub-code-deploy

  # AWS CodeDeploy Deployment Group 이름
  # 실제 AWS CodeDeploy에 동일한 Deployment Group이 생성되어 있어야 합니다.
  DEPLOYMENT_GROUP_NAME: prompt-hub-code-deploy-group

# CD 실행 조건
on:
  # main 브랜치에 push가 발생하면 실행됩니다.
  # develop -> main PR이 merge되면 main에 push 이벤트가 발생하므로 CD가 동작합니다.
  push:
    branches:
      - main

  # GitHub Actions 화면에서 수동 배포도 가능하게 합니다.
  workflow_dispatch:

# workflow 권한
permissions:
  # 저장소 코드를 읽기 위한 최소 권한
  contents: read

# 운영 배포가 동시에 여러 번 실행되는 것을 방지합니다.
concurrency:
  group: prompthub-production-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    # Job 이름
    name: Build and Deploy PromptHub

    # GitHub-hosted Ubuntu runner 사용
    runs-on: ubuntu-latest

    # GitHub Environment를 사용하는 경우 production 환경으로 표시됩니다.
    environment:
      name: production

    steps:
      # 1. 저장소 코드 가져오기
      - name: Checkout source code
        uses: actions/checkout@v6

      # 2. Java 21 설치
      # Spring Boot 4.x + Java 21 환경 기준입니다.
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      # 3. Gradle 실행 환경 및 캐시 설정
      # 의존성 다운로드 시간을 줄여 CD 시간을 단축할 수 있습니다.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      # 4. application-secret.properties 생성
      # 단일 모듈 Spring Boot 프로젝트 기준입니다.
      #
      # 만약 PromptHub가 멀티 모듈이라면
      # ./src/main/resources 경로를 실제 실행 모듈의 resources 경로로 변경해야 합니다.
      #
      # 예:
      # ./prompthub-api/src/main/resources/application-secret.properties
      - name: Make application-secret.properties
        run: |
          mkdir -p ./src/main/resources

          printf "%s" "${{ secrets.APPLICATION_SECRET }}" > ./src/main/resources/application-secret.properties

      # 5. gradlew 실행 권한 부여
      # Linux runner에서 gradlew 실행 권한이 없으면 Permission denied가 발생할 수 있습니다.
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew
        shell: bash

      # 6. Gradle 빌드
      # main에 반영된 코드가 정상 빌드되는지 배포 전 다시 검증합니다.
      - name: Build with Gradle
        run: ./gradlew clean build --no-daemon
        shell: bash

      # 7. CodeDeploy 배포용 디렉토리 생성
      # 전체 프로젝트를 압축하지 않고, 배포에 필요한 파일만 모읍니다.
      - name: Prepare deployment bundle
        run: |
          mkdir -p deploy-bundle

          # CodeDeploy 설정 파일 복사
          cp appspec.yml deploy-bundle/

          # 배포 스크립트가 있다면 복사
          # 예: scripts/start.sh, scripts/stop.sh
          if [ -d scripts ]; then
            cp -r scripts deploy-bundle/scripts
          fi

          # Spring Boot 빌드 결과물 복사
          mkdir -p deploy-bundle/build/libs
          cp build/libs/*.jar deploy-bundle/build/libs/

        shell: bash

      # 8. zip 파일 생성
      # CodeDeploy는 S3에 업로드된 zip 파일을 기준으로 배포합니다.
      - name: Make zip file
        run: |
          cd deploy-bundle
          zip -r ../$GITHUB_SHA.zip .
        shell: bash

      # 9. AWS 인증 정보 설정
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_SECRET }}
          aws-region: ap-northeast-2

      # 10. S3에 zip 업로드
      # 업로드 경로:
      # s3://prompt-hub-deploy-bucket/prompt-hub/{커밋SHA}.zip
      - name: Upload to S3
        run: |
          aws s3 cp \
            --region ap-northeast-2 \
            ./$GITHUB_SHA.zip \
            s3://$BUCKET_NAME/$PROJECT_NAME/$GITHUB_SHA.zip
        shell: bash

      # 11. AWS CodeDeploy 배포 실행
      - name: Code Deploy
        run: |
          aws deploy create-deployment \
            --application-name $CODE_DEPLOY_APP_NAME \
            --deployment-config-name CodeDeployDefault.OneAtATime \
            --deployment-group-name $DEPLOYMENT_GROUP_NAME \
            --s3-location bucket=$BUCKET_NAME,bundleType=zip,key=$PROJECT_NAME/$GITHUB_SHA.zip \
            --description "Deploy $PROJECT_NAME from GitHub Actions. Commit: $GITHUB_SHA" \
            --file-exists-behavior OVERWRITE
        shell: bash
