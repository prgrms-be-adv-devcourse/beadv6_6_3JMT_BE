spring:
  config:
    import: ""
  datasource:
    url: jdbc:h2:mem:prompthub_product_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        hbm2ddl:
          create_namespaces: true   # @Table(schema=...) 대응 — H2가 product_service 스키마 먼저 생성
    open-in-view: false
  kafka:
    bootstrap-servers: localhost:9092

eureka:
  client:
    enabled: false
