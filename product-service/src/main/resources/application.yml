spring:
  application:
    name: product-service
  config:
    import:
      - ${CONFIG_IMPORT:optional:configserver:}
      - optional:file:./.env[.properties]
      - optional:file:../.env[.properties]
      - optional:file:./product-service/.env[.properties]
  cloud:
    config:
      fail-fast: true
      retry:
        max-attempts: 6
        initial-interval: 1000
        max-interval: 2000
        multiplier: 1.1
