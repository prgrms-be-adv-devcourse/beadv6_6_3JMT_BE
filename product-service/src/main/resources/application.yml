spring:
  application:
    name: product-service
  config:
    import:
      - optional:file:./.env[.properties]
      - optional:file:./product-service/.env[.properties]

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:create}
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    # Local Next.js dev server. Override with CORS_ALLOWED_ORIGINS when needed.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

logging:
  level:
    com.prompthub.product: INFO
    org.hibernate.SQL: debug
