spring:
  application:
    name: product-service
  config:
    import:
      - optional:configserver:http://localhost:8888
      - optional:file:./.env[.properties]
      - optional:file:./product-service/.env[.properties]
  profiles:
    default: local
  cloud:
    config:
      fail-fast: true
      retry:
        max-attempts: 6
        initial-interval: 1000
        max-interval: 2000
        multiplier: 1.1
