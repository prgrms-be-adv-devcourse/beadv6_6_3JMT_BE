spring:
  application:
    name: product-service
  config:
    import:
      - optional:file:./.env[.properties]
      - optional:file:./product-service/.env[.properties]

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:prompthub_product_dev}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    # Local Next.js dev server. Override with CORS_ALLOWED_ORIGINS when needed.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

prompthub:
  grpc:
    server:
      port: ${GRPC_SERVER_PORT:9092}

logging:
  level:
    com.prompthub.product: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
