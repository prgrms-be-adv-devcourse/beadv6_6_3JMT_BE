server:
  port: 18083

spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}?currentSchema=order_service
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
    consumer:
      group-id: order-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
        spring.json.trusted.packages: com.prompthub.order.*
    listener:
      ack-mode: manual
  cloud:
    openfeign:
      client:
        config:
          product-service:
            connect-timeout: 2000
            read-timeout: 3000
  grpc:
    client:
      channel:
        product:
          target: 'static://${PRODUCT_GRPC_HOST:product-service}:${PRODUCT_GRPC_SERVER_PORT}'
        seller:
          target: 'static://${SELLER_GRPC_HOST:user-service}:${USER_GRPC_SERVER_PORT}'
        payment-refund:
          target: 'static://${PAYMENT_REFUND_GRPC_HOST:payment-service}:${PAYMENT_REFUND_GRPC_PORT:9084}'

grpc:
  server:
    port: ${ORDER_GRPC_SERVER_PORT}

prompthub:
  clients:
    product-service:
      url: http://product-service:8082
  grpc:
    product:
      deadline-ms: 1000
    seller:
      deadline-ms: 2000
    payment-refund:
      deadline-ms: 2000
  outbox-relay:
    enabled: true
    fixed-delay-ms: 5000
    batch-size: 100
    max-retry-count: 3
    topic: ${ORDER_EVENTS_TOPIC:order-events}

resilience4j:
  circuitbreaker:
    configs:
      product-grpc-default:
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        slow-call-duration-threshold: 700ms
        slow-call-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
  bulkhead:
    instances:
      product-grpc-bulkhead:
        max-concurrent-calls: 20
        max-wait-duration: 0ms
