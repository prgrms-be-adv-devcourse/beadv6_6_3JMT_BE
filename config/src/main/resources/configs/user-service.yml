server:
  port: 18081

spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}?currentSchema=user_service
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: Asia/Seoul
  jackson:
    time-zone: Asia/Seoul
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      group-id: user-service
      auto-offset-reset: earliest
      enable-auto-commit: false

jwt:
  private-key: ${JWT_PRIVATE_KEY}
  public-key: ${JWT_PUBLIC_KEY}
  access-token-expire-seconds: 900
  refresh-token-expire-seconds: 604800

grpc:
  server:
    port: ${USER_GRPC_SERVER_PORT}

user:
  kafka:
    consumer:
      settlement:
        topic: settlement-events
    listener:
      settlement:
        enabled: ${USER_SETTLEMENT_KAFKA_LISTENER_ENABLED:false}
    dlt:
      slack:
        webhook-url: ${SETTLEMENT_DLT_SLACK_WEBHOOK_URL:}
  grpc:
    seller-settlement:
      internal-token: ${AI_USER_GRPC_TOKEN}
