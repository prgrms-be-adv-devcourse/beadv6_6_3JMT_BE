eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
  instance:
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway

gateway:
  api-versions:
    admin-service: [ v1, v2 ]
    order-service: [ v1, v2 ]
    product-service: [ v1, v2 ]
    payment-service: [ v1, v2 ]
    user-service: [ v1, v2 ]
    ai-service: [ v2 ]
    notification-service: [ v2 ]
  # 경로별 role 접근 정책. SELLER는 SELLER만, SELLER_OR_ADMIN은 두 role을 허용한다.
  # /admin/**은 코드 기본값(RoutePolicyResolver)이라 여기 안 적어도 ADMIN으로 강제되며,
  # 버전 세그먼트는 실제 요청 경로(/api/{version}/...)에 맞춰 Ant `*`로 흡수한다.
  route-policies:
    /api/*/sellers/me/**: SELLER
    /api/*/ai/settlement/**: SELLER_OR_ADMIN
