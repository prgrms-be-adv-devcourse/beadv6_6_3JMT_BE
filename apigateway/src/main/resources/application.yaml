server:
  port: 8000

spring:
  application:
    name: apigateway
  config:
    import: optional:configserver:http://localhost:8888
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: settlement-service
              uri: lb://SETTLEMENT-SERVICE
              predicates:
                - Path=/api/v1/sellers/me/settlements/**, /api/v1/admin/settlements/**

            - id: order-service
              uri: lb://ORDER-SERVICE
              predicates:
                - Path=/api/v1/orders, /api/v1/orders/**, /api/v1/cart, /api/v1/cart/**, /api/v1/admin/orders, /api/v1/admin/orders/**, /api/v1/internal/orders/**

            - id: product-service
              uri: lb://PRODUCT-SERVICE
              predicates:
                - Path=/api/v1/products/**

            - id: payment-service
              uri: lb://PAYMENT-SERVICE
              predicates:
                - Path=/api/v1/payments/**

            - id: user-service
              uri: lb://USER-SERVICE
              predicates:
                - Path=/api/v1/auth/**, /api/v1/users/**, /api/v1/seller/**, /api/v1/sellers/**, /api/v1/wishlists/**, /api/v1/admin/**

            # Swagger API docs 프록시 라우트 (각 서비스 /v3/api-docs를 prefix 경로로 노출)
            - id: user-service-docs
              uri: lb://USER-SERVICE
              predicates:
                - Path=/user-service/v3/api-docs
              filters:
                - RewritePath=/user-service/v3/api-docs, /v3/api-docs

            - id: product-service-docs
              uri: lb://PRODUCT-SERVICE
              predicates:
                - Path=/product-service/v3/api-docs
              filters:
                - RewritePath=/product-service/v3/api-docs, /v3/api-docs

            - id: order-service-docs
              uri: lb://ORDER-SERVICE
              predicates:
                - Path=/order-service/v3/api-docs
              filters:
                - RewritePath=/order-service/v3/api-docs, /v3/api-docs

            - id: payment-service-docs
              uri: lb://PAYMENT-SERVICE
              predicates:
                - Path=/payment-service/v3/api-docs
              filters:
                - RewritePath=/payment-service/v3/api-docs, /v3/api-docs

            - id: settlement-service-docs
              uri: lb://SETTLEMENT-SERVICE
              predicates:
                - Path=/settlement-service/v3/api-docs
              filters:
                - RewritePath=/settlement-service/v3/api-docs, /v3/api-docs

springdoc:
  swagger-ui:
    urls:
      - name: user-service
        url: /user-service/v3/api-docs
      - name: product-service
        url: /product-service/v3/api-docs
      - name: order-service
        url: /order-service/v3/api-docs
      - name: payment-service
        url: /payment-service/v3/api-docs
      - name: settlement-service
        url: /settlement-service/v3/api-docs
  api-docs:
    enabled: true

jwt:
  public-key: ${JWT_PUBLIC_KEY}

management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway
