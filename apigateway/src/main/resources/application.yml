server:
  port: 8000

spring:
  application:
    name: apigateway
  config:
    import: ${CONFIG_IMPORT:}
  cloud:
    config:
      fail-fast: true
      retry:
        max-attempts: 6
        initial-interval: 1000
        max-interval: 2000
        multiplier: 1.1
    gateway:
      server:
        webflux:
          routes:
            # admin-service ~ user-service 라우트는 gateway.api-versions 설정을 소스로
            # VersionedRouteDefinitionLocator(코드)가 동적으로 생성한다. (ADR-0007)
            - id: user-service-docs
              uri: lb://USER-SERVICE
              predicates:
                - Path=/user-service/v3/api-docs
              filters:
                - RewritePath=/user-service/v3/api-docs, /v3/api-docs

            - id: product-service-docs
              uri: lb://PRODUCT-SERVICE
              predicates:
                - Path=/product-service/v3/api-docs
              filters:
                - RewritePath=/product-service/v3/api-docs, /v3/api-docs

            - id: order-service-docs
              uri: lb://ORDER-SERVICE
              predicates:
                - Path=/order-service/v3/api-docs
              filters:
                - RewritePath=/order-service/v3/api-docs, /v3/api-docs

            - id: payment-service-docs
              uri: lb://PAYMENT-SERVICE
              predicates:
                - Path=/payment-service/v3/api-docs
              filters:
                - RewritePath=/payment-service/v3/api-docs, /v3/api-docs

gateway:
  # 서비스별 활성 API 버전 리스트. 병행 서빙이 필요해지면 [v1, v2]로 바꾼다.
  # 리스트를 비우거나 서비스 키를 지우면 해당 서비스의 라우트/화이트리스트는 사라지고 404가 된다. (ADR-0007)
  api-versions:
    admin-service: [ v1, v2 ]
    order-service: [ v1, v2 ]
    product-service: [ v1, v2 ]
    payment-service: [ v1, v2 ]
    user-service: [ v1, v2 ]

jwt:
  public-key: ${JWT_PUBLIC_KEY}

springdoc:
  swagger-ui:
    urls:
      - name: user-service
        url: /user-service/v3/api-docs
      - name: product-service
        url: /product-service/v3/api-docs
      - name: order-service
        url: /order-service/v3/api-docs
      - name: payment-service
        url: /payment-service/v3/api-docs
  api-docs:
    enabled: true

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://prompthub-fe.vercel.app,http://localhost:3000}
