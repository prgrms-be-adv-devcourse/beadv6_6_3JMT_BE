spring:
  application:
    name: payment-service
  config:
    import:
      - optional:file:.env[.properties]
      - optional:configserver:http://localhost:8888

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true   # Hibernate DDL 이후 schema.sql 실행
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always                          # 비내장 PostgreSQL에서도 schema.sql 실행

  kafka:
    bootstrap-servers: localhost:9092
    admin:
      auto-create: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: payment-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.prompthub.paymentservice.*"

server:
  port: 8084

payment:
  toss:
    secret-key: ${TOSS_SECRET_KEY:test-dummy-key}
    base-url: https://api.tosspayments.com/v1
    test-mode: ${TOSS_TEST_MODE:false}

prompthub:
  grpc:
    order:
      host: ${ORDER_GRPC_HOST:localhost}
      port: ${ORDER_GRPC_PORT:9083}
      deadline-ms: ${ORDER_GRPC_DEADLINE_MS:2000}

eureka:
  client:
    enabled: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health, info
