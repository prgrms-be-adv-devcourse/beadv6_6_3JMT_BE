server:
  port: 8084

spring:
  cloud:
    config:
      enabled: false
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true   # Hibernate DDL 이후 schema.sql 실행
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always                          # 비내장 PostgreSQL에서도 schema.sql 실행

  kafka:
    bootstrap-servers: localhost:9092
    admin:
      auto-create: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: payment-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.prompthub.paymentservice.*"

  grpc:
    client:
      channel:
        order:
          target: static://${ORDER_GRPC_HOST:localhost}:${ORDER_GRPC_PORT:9083}
          default:
            deadline: ${ORDER_GRPC_DEADLINE_MS:2000}ms

payment:
  toss:
    secret-key: ${TOSS_SECRET_KEY:test-dummy-key}
    base-url: https://api.tosspayments.com/v1
    test-mode: ${TOSS_TEST_MODE:false}

eureka:
  client:
    enabled: false
