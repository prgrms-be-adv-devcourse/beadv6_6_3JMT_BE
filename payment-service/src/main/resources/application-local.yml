server:
  port: 8084

spring:
  cloud:
    config:
      enabled: false
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate                    # 스키마는 Flyway(V{n} 마이그레이션)가 만든다
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  kafka:
    bootstrap-servers: localhost:9092
    admin:
      auto-create: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: payment-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.prompthub.payment.*"

  grpc:
    client:
      channel:
        order:
          target: static://${ORDER_GRPC_HOST:localhost}:${ORDER_GRPC_PORT:9083}
          default:
            deadline: ${ORDER_GRPC_DEADLINE_MS:2000}ms

payment:
  toss:
    secret-key: ${TOSS_SECRET_KEY:test-dummy-key}
    base-url: https://api.tosspayments.com/v1

resilience4j:
  circuitbreaker:
    configs:
      toss-payment-default:
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        slow-call-duration-threshold: 20000ms
        slow-call-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3

eureka:
  client:
    enabled: false
