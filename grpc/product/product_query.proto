syntax = "proto3";

package settlement.product;

option java_multiple_files = true;
option java_package = "com.prompthub.grpc.product";
option java_outer_classname = "ProductQueryProto";

service ProductQueryService {
  rpc GetSellerStats(GetSellerStatsRequest) returns (GetSellerStatsResponse);
}

message GetSellerStatsRequest {
  string seller_id = 1;
}

message GetSellerStatsResponse {
  string seller_id = 1;
  int32 product_count = 2;
  int64 sales_count = 3;
}
