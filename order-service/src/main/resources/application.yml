spring:
  application:
    name: order-service
  config:
    import:
      - ${CONFIG_IMPORT:}
      - optional:file:.env[.properties]
  profiles:
    default: local
  cloud:
    config:
      enabled: true

---

spring:
  config:
    activate:
      on-profile: default | local
  cloud:
    compatibility-verifier:
      enabled: false
    config:
      fail-fast: true
      retry:
        max-attempts: 6
        initial-interval: 1000
        max-interval: 2000
        multiplier: 1.1
