spring:
  application:
    name: order-service
  config:
    import:
      - optional:configserver:http://localhost:8888
      - optional:file:.env[.properties]
  profiles:
    default: local
  cloud:
    config:
      enabled: true

prompthub:
  outbox-relay:
    enabled: true
    fixed-delay-ms: 5000
    batch-size: 100
    max-retry-count: 3
  order:
    enabled: true
    payment-timeout-minutes: 20
    fixed-delay-ms: 5000
    batch-size: 100
    max-retry-count: 3

---

spring:
  config:
    activate:
      on-profile: default | local
  cloud:
    compatibility-verifier:
      enabled: false
    config:
      fail-fast: true
      retry:
        max-attempts: 6
        initial-interval: 1000
        max-interval: 2000
        multiplier: 1.1



