spring:
  flyway:
    enabled: false
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: test-group
  config:
    import: ""
  cloud:
    compatibility-verifier:
      enabled: false
    config:
      enabled: false
      fail-fast: false
  datasource:
    url: jdbc:h2:mem:prompthub_order_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

grpc:
  server:
    port: 0

prompthub:

  grpc:
    product:
      deadline-ms: 1000
  outbox-relay:
    enabled: false
    fixed-delay-ms: 5000
    topic: order-events
    batch-size: 100
    max-retry-count: 3
  order:
    enabled: false

eureka:
  client:
    enabled: false

logging:
  level:
    com.prompthub.order: debug

resilience4j:
  circuitbreaker:
    configs:
      product-grpc-default:
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        slow-call-duration-threshold: 700ms
        slow-call-rate-threshold: 50
        wait-duration-in-open-state: 100ms
        permitted-number-of-calls-in-half-open-state: 3
  bulkhead:
    instances:
      product-grpc-bulkhead:
        max-concurrent-calls: 20
        max-wait-duration: 0ms
